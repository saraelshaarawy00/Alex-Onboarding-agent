<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Setup Assistant | SaaS Onboarding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ai-setup-widget.css">
</head>
<body>

    <!-- Widget Trigger Button (Optional for now, but keeping for direct access) -->
    <button id="widget-trigger" class="widget-trigger">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ai-sparkle-icon"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        <span>Setup Project</span>
    </button>

    <!-- Modal Overlay -->
    <div id="panel-overlay" class="panel-overlay"></div>

    <!-- AI Setup Assistant Centered Modal -->
    <div id="assistant-panel" class="assistant-panel">
        <div class="panel-header">
            <div class="header-content">
                <div class="ai-avatar">
                   <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ai-sparkle-icon"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div class="header-text">
                    <h2>AI Setup Assistant</h2>
                    <p>Let’s get your website ready for translation</p>
                </div>
            </div>
            <button id="close-panel" class="close-btn" aria-label="Close panel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <div class="progress-section">
            <div class="progress-steps-container">
                <div id="step-1" class="step-indicator active"><span>1</span></div>
                <div class="step-line"></div>
                <div id="step-2" class="step-indicator"><span>2</span></div>
                <div class="step-line"></div>
                <div id="step-3" class="step-indicator"><span>3</span></div>
                <div class="step-line"></div>
                <div id="step-4" class="step-indicator"><span>4</span></div>
                <div class="step-line"></div>
                <div id="step-5" class="step-indicator"><span>5</span></div>
            </div>
        </div>

        <div id="main-content" class="main-content">
            <!-- Dynamic step content will be loaded here -->
            <div id="ai-response-area" class="ai-response-area"></div>
            <div id="dynamic-fields" class="dynamic-fields"></div>
        </div>

        <div class="panel-footer">
            <button id="back-btn" class="btn btn-tertiary" style="visibility: hidden;">Back</button>
            <div class="right-actions">
                <button id="skip-btn" class="btn btn-secondary">Skip</button>
                <button id="continue-btn" class="btn btn-primary" disabled>Continue</button>
            </div>
        </div>
    </div>

    <!-- Templates for different steps -->
    
    <!-- Step 1: Website Input -->
    <template id="tpl-step-1">
        <div class="step-content fade-in">
            <h3 class="step-title">Start by adding your website link</h3>
            <div class="input-group">
                <label for="website-url">Website URL</label>
                <input type="url" id="website-url" placeholder="https://yourwebsite.com" class="input-field">
            </div>
            <div class="input-group">
                <label for="reference-url">Reference website (optional)</label>
                <input type="url" id="reference-url" placeholder="https://competitor.com" class="input-field">
            </div>
            <div class="step-actions">
                <button id="step-1-next" class="btn btn-primary btn-lg" disabled>Analyze Website</button>
            </div>
        </div>
    </template>

    <!-- Step 2: AI Detection -->
    <template id="tpl-step-2">
        <div class="step-content fade-in">
            <h3 class="step-title">Based on your website, here’s what I found 👀</h3>
            <div class="detection-cards">
                <div class="detection-card">
                    <span class="card-label">Industry</span>
                    <input type="text" id="detected-industry" class="editable-field" value="E-commerce">
                </div>
                <div class="detection-card">
                    <span class="card-label">Target Audience</span>
                    <input type="text" id="detected-audience" class="editable-field" value="Businesses">
                </div>
            </div>
            <p class="micro-note">You can edit these if they're not quite right.</p>
            <div class="step-actions">
                <button id="step-2-next" class="btn btn-primary btn-lg">Looks good, Next</button>
            </div>
        </div>
    </template>

    <!-- Step 3: Languages -->
    <template id="tpl-step-3">
        <div class="step-content fade-in">
            <h3 class="step-title">Your website is in <span class="highlight">English</span></h3>
            <p class="step-subtitle">Which languages do you want to translate to?</p>
            <div id="chips-container" class="chips-container">
                <!-- Chips will be generated here -->
            </div>
            <div class="smart-suggestion">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spark-icon"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                <span>We recommend <strong>Arabic</strong> based on your audience</span>
            </div>
            <div class="step-actions">
                <button id="step-3-next" class="btn btn-primary btn-lg" disabled>Continue to Pages</button>
            </div>
        </div>
    </template>

    <!-- Step 4: Pages Selection -->
    <template id="tpl-step-4">
        <div class="step-content fade-in">
            <h3 class="step-title">We found multiple pages on your website</h3>
            <div class="selection-options">
                <label class="option-card active" data-option="all">
                    <input type="radio" name="page-selection" value="all" checked>
                    <div class="option-content">
                        <strong>Translate all pages</strong>
                        <span>Recommended for full coverage</span>
                    </div>
                </label>
                <label class="option-card" data-option="specific">
                    <input type="radio" name="page-selection" value="specific">
                    <div class="option-content">
                        <strong>Choose specific pages</strong>
                        <span>Select only the pages you need</span>
                    </div>
                </label>
            </div>
            <div id="pages-checklist" class="pages-checklist hidden">
                <div class="page-item">
                    <span>Home (/)</span>
                    <label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="page-item">
                    <span>Pricing (/pricing)</span>
                    <label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
                <div class="page-item">
                    <span>About (/about)</span>
                    <label class="toggle-switch"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                </div>
            </div>
            <div class="step-actions">
                <button id="step-4-next" class="btn btn-primary btn-lg">Continue to Script</button>
            </div>
        </div>
    </template>

    <!-- Step 5: Script Installation -->
    <template id="tpl-step-5">
        <div class="step-content fade-in">
            <h3 class="step-title">Install the language switcher</h3>
            <p class="step-subtitle">To show the language switcher on your website, you’ll need to add this small script.</p>
            <div class="code-block-container">
                <div class="code-header">
                    <span>Javascript Snippet</span>
                    <button id="copy-script-btn" class="copy-btn">Copy</button>
                </div>
                <pre><code>&lt;script src="https://cdn.wap-translate.com/widget.js" data-project="WP-782" async&gt;&lt;/script&gt;</code></pre>
            </div>
            <p class="micro-note">Paste it into your website once (like in your main layout), and it will appear across your whole website.</p>
            <div class="step-actions">
                <button id="step-5-next" class="btn btn-primary btn-lg">Copy Script & Finish</button>
                <button id="step-5-skip" class="btn btn-secondary">I'll do this later</button>
            </div>
        </div>
    </template>

    <!-- Final Step: Success -->
    <template id="tpl-step-final">
        <div class="step-content fade-in success-state">
            <div class="success-icon">🚀</div>
            <h3 class="step-title">You're all set!</h3>
            <p class="step-subtitle">You can always come back and edit your setup anytime.</p>
            <div class="final-actions">
                <button class="btn btn-primary w-full" id="finish-go-project">Go to my project</button>
                <button class="btn btn-secondary w-full" id="finish-copy-script">Copy script and install manually</button>
            </div>
        </div>
    </template>

    <!-- AI Thinking/Analyzing Component -->
    <template id="tpl-ai-thinking">
        <div class="ai-thinking fade-in">
            <div class="thinking-dots"><span></span><span></span><span></span></div>
            <span id="thinking-text">Analyzing your website...</span>
        </div>
    </template>

    <script src="ai-setup-widget.js"></script>
</body>
</html>
