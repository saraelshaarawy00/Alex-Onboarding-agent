<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex | AI Sales Agent Onboarding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ai-setup-widget.css">
</head>
<body>

    <!-- Modal Overlay -->
    <div id="panel-overlay" class="panel-overlay"></div>

    <!-- AI Setup Assistant Modal -->
    <div id="assistant-panel" class="assistant-panel">
        <div class="panel-header">
            <div class="header-content">
                <div class="alex-logo-container">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="robot-icon"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                    <span class="alex-text">Alex</span>
                </div>
                <div class="header-text">
                    <h2>AI Setup Assistant</h2>
                    <p>Building your expert sales agent...</p>
                </div>
            </div>
            <button id="close-panel" class="close-btn" aria-label="Close panel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>

        <div class="progress-section">
            <div class="progress-steps-container">
                <div id="step-1" class="step-indicator active"><span>1</span></div>
                <div class="step-line"></div>
                <div id="step-2" class="step-indicator"><span>2</span></div>
                <div class="step-line"></div>
                <div id="step-3" class="step-indicator"><span>3</span></div>
                <div class="step-line"></div>
                <div id="step-4" class="step-indicator"><span>4</span></div>
                <div class="step-line"></div>
                <div id="step-5" class="step-indicator"><span>5</span></div>
                <div class="step-line"></div>
                <div id="step-6" class="step-indicator"><span>6</span></div>
                <div class="step-line"></div>
                <div id="step-7" class="step-indicator"><span>7</span></div>
                <div class="step-line"></div>
                <div id="step-8" class="step-indicator"><span>8</span></div>
            </div>
        </div>

        <div id="main-content" class="main-content">
            <!-- Dynamic step content -->
            <div id="ai-response-area" class="ai-response-area"></div>
            <div id="dynamic-fields" class="dynamic-fields"></div>
        </div>

        <div class="panel-footer">
            <button id="back-btn" class="btn btn-tertiary" style="visibility: hidden;">Back</button>
            <div class="right-actions">
                <button id="skip-btn" class="btn btn-secondary">Skip this step</button>
                <button id="continue-btn" class="btn btn-primary">Next Step</button>
            </div>
        </div>
    </div>

    <!-- Step 1: Company Name -->
    <template id="tpl-step-1">
        <div class="step-content fade-in">
            <h3 class="step-title">Welcome! First, what's your company name? 😊</h3>
            <p class="step-subtitle">This helps me personalize your AI agent's identity.</p>
            <div class="input-group">
                <label for="company-name">Company Name</label>
                <input type="text" id="company-name" placeholder="e.g. Acme Corp" class="input-field">
            </div>
            <p class="micro-note mt-4">I'm excited to help you build your sales engine!</p>
        </div>
    </template>

    <!-- Step 2: Website URL -->
    <template id="tpl-step-2">
        <div class="step-content fade-in">
            <h3 class="step-title">Great! Now, what's your website URL? 🌐</h3>
            <p class="step-subtitle">I'll use this to learn about your brand and services.</p>
            <div class="input-group">
                <label for="website-url">Website URL</label>
                <input type="url" id="website-url" placeholder="https://acme.com" class="input-field">
            </div>
        </div>
    </template>

    <!-- Step 3: Knowledge Brain (Files) -->
    <template id="tpl-step-3">
        <div class="step-content fade-in">
            <h3 class="step-title">Let's feed your AI some knowledge! 🧠</h3>
            <p class="step-subtitle">Do you have any documents (PDFs, Docs) that describe your company?</p>
            <div class="input-group">
                <div class="drop-zone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; opacity: 0.3;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    <br>
                    <span>Drag & drop or <span class="highlight" style="color: var(--primary); font-weight: 600;">browse files</span></span>
                </div>
            </div>
        </div>
    </template>

    <!-- Step 4: Knowledge Brain (Links) -->
    <template id="tpl-step-4">
        <div class="step-content fade-in">
            <h3 class="step-title">Perfect. Any other links I should read? 🔗</h3>
            <p class="step-subtitle">Helpful for documentation, blogs, or case studies.</p>
            <div class="input-group">
                <label for="kb-website">Add a link</label>
                <input type="url" id="kb-website" placeholder="https://docs.acme.com" class="input-field">
            </div>
        </div>
    </template>

    <!-- Step 5: Service Catalog -->
    <template id="tpl-step-5">
        <div class="step-content fade-in">
            <h3 class="step-title">How about your services or pricing? 💰</h3>
            <p class="step-subtitle">Upload your catalog so I can answer pricing questions accurately.</p>
            <div class="input-group">
                <div class="drop-zone" style="padding: 60px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px; opacity: 0.3;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    <br>
                    <span>Upload CSV, PDF or Excel</span>
                </div>
            </div>
        </div>
    </template>

    <!-- Step 6: Agent Persona -->
    <template id="tpl-step-6">
        <div class="step-content fade-in">
            <h3 class="step-title">Almost there! What's your goal for this agent? ✨</h3>
            <p class="step-subtitle">Describe what you want me to achieve (e.g., Book meetings, answer support).</p>
            <div class="input-group">
                <textarea id="agent-goal" class="input-field" rows="4" placeholder="e.g. I want to book qualified meetings for our cloud security platform..."></textarea>
            </div>
            <div id="ai-persona-result" class="hidden fade-in">
                <div class="editable-cards">
                    <div class="edit-card">
                        <span class="card-label">Name</span>
                        <input type="text" class="card-value" id="persona-name" value="Alex">
                    </div>
                    <div class="edit-card">
                        <span class="card-label">Tone</span>
                        <input type="text" class="card-value" id="persona-tone" value="Professional & Friendly">
                    </div>
                </div>
                <div class="input-group mt-4">
                    <label>Internal Instructions</label>
                    <textarea class="input-field" rows="3" id="persona-instructions"></textarea>
                </div>
            </div>
        </div>
    </template>

    <!-- Step 7: Leads Setup -->
    <template id="tpl-step-7">
        <div class="step-content fade-in">
            <h3 class="step-title">Who are we reaching out to? 🎯</h3>
            <p class="step-subtitle">Select how you want to add your first batch of leads.</p>
            <div class="selection-options">
                <label class="option-card" data-option="upload">
                    <div class="option-content">
                        <strong>Upload lead file</strong>
                        <span>CSV with name and contact</span>
                    </div>
                </label>
                <label class="option-card" data-option="manual">
                    <div class="option-content">
                        <strong>Add manually</strong>
                        <span>Type in lead details</span>
                    </div>
                </label>
                <label class="option-card" data-option="skip">
                    <div class="option-content">
                        <strong>Skip for now</strong>
                        <span>Add them later from dashboard</span>
                    </div>
                </label>
            </div>
        </div>
    </template>

    <!-- Step 8: Apollo Integration -->
    <template id="tpl-step-8">
        <div class="step-content fade-in">
            <h3 class="step-title">Finally, want to connect Apollo? (Optional) 🚀</h3>
            <p class="step-subtitle">This helps in finding more high-quality leads automatically.</p>
            <div class="integration-card">
                <div class="input-group">
                    <label for="apollo-key">Apollo API Key</label>
                    <input type="password" id="apollo-key" placeholder="Paste your API key here" class="input-field">
                </div>
                <button class="btn btn-primary mt-2" id="test-apollo-btn">Test Connection</button>
            </div>
        </div>
    </template>

    <!-- Final Step: Success -->
    <template id="tpl-step-final">
        <div class="step-content fade-in success-state">
            <div class="success-icon">🚀</div>
            <h3 class="step-title">You're all set, and you're doing great!</h3>
            <p class="step-subtitle">Your AI agent is now trained and ready to fly.</p>
            <div class="final-actions">
                <button class="btn btn-primary w-full" id="finish-generate">Generate Campaign</button>
                <button class="btn btn-secondary w-full mt-2" id="finish-dashboard">Go to Dashboard</button>
            </div>
        </div>
    </template>

    <!-- AI Thinking Template -->
    <template id="tpl-ai-thinking">
        <div class="ai-thinking">
            <div class="thinking-dots"><span></span><span></span><span></span></div>
            <span id="thinking-text">Analyzing...</span>
        </div>
    </template>

    <script src="ai-setup-widget.js"></script>
</body>
</html>
